name: sebscan
description: SebScan mobile app for ingredient scanning and trigger analysis.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  google_fonts: ^6.2.0
  mobile_scanner: ^6.0.0
  google_mlkit_text_recognition: ^0.13.0
  fl_chart: ^0.69.0
  http: ^1.2.0
  image_picker: ^1.1.0
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
